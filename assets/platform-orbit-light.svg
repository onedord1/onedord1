<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
<title id="title">Animated DevOps platform orbit</title>
<desc id="desc">A central Kubernetes platform connected to DevOps tools with animated telemetry particles and a clear reserved header zone.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#F8FBFF"/><stop offset="1" stop-color="#EAF3FF"/></linearGradient>
  <linearGradient id="core" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#30E6D2"/><stop offset=".5" stop-color="#5CA8FF"/><stop offset="1" stop-color="#D784FF"/></linearGradient>
  <radialGradient id="halo"><stop stop-color="#30E6D2" stop-opacity=".2"/><stop offset="1" stop-color="#30E6D2" stop-opacity="0"/></radialGradient>
  <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="8"/></filter>
  <path id="orbit1" d="M380 280a220 88 0 1 0 440 0a220 88 0 1 0-440 0"/>
  <path id="orbit2" d="M285 280a315 135 0 1 0 630 0a315 135 0 1 0-630 0"/>
  <path id="orbit3" d="M180 280a420 170 0 1 0 840 0a420 170 0 1 0-840 0"/>
</defs>
<rect width="1200" height="460" rx="24" fill="url(#bg)"/>

<!-- reserved header zone: nothing from the orbit is allowed above y=102 -->
<text x="50" y="46" fill="#10243E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="800" letter-spacing="2">PLATFORM ORBIT // CLOUD-NATIVE TOOLCHAIN</text>
<text x="50" y="72" fill="#526B85" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Every tool maps to delivery, reliability, security or observability—not a random icon wall.</text>
<path d="M50 94H1150" stroke="#D8E6F4" opacity=".72"/>

<g opacity=".75">
  <use href="#orbit1" fill="none" stroke="#BED2E8" stroke-width="1.3" stroke-dasharray="5 7"/>
  <use href="#orbit2" fill="none" stroke="#BED2E8" stroke-width="1.1" stroke-dasharray="3 9"/>
  <use href="#orbit3" fill="none" stroke="#BED2E8" stroke-width="1" stroke-dasharray="2 11"/>
</g>
<ellipse cx="600" cy="280" rx="198" ry="126" fill="url(#halo)" filter="url(#glow)"/>

<!-- central platform core -->
<g transform="translate(600 280)">
  <circle r="88" fill="#FFFFFF" stroke="#BED2E8" stroke-width="2"/>
  <circle r="66" fill="#EDF5FF" stroke="url(#core)" stroke-width="3" stroke-dasharray="9 8">
    <animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite"/>
  </circle>
  <g>
    <circle r="34" fill="#326CE5" opacity=".16"/>
    <circle r="21" fill="none" stroke="#5CA8FF" stroke-width="3"/>
    <g stroke="#5CA8FF" stroke-width="3" stroke-linecap="round">
      <path d="M0-31V-20M0 20V31M-31 0H-20M20 0H31M-22-22l8 8M14 14l8 8M22-22l-8 8M-14 14l-8 8"/>
    </g>
    <circle r="7" fill="#30E6D2"/>
    <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="12s" repeatCount="indefinite"/>
  </g>
  <rect x="-104" y="45" width="208" height="43" rx="10" fill="#FFFFFF" opacity=".96"/>
  <text y="63" text-anchor="middle" fill="#10243E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="800">KUBERNETES PLATFORM</text>
  <text y="80" text-anchor="middle" fill="#526B85" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">secure • observable • recoverable</text>
</g>

<!-- animated orbit signals -->
<g fill="#30E6D2">
  <circle r="5"><animateMotion dur="6s" repeatCount="indefinite"><mpath href="#orbit1"/></animateMotion></circle>
  <circle r="4" fill="#5CA8FF"><animateMotion dur="9s" begin="-3s" repeatCount="indefinite"><mpath href="#orbit2"/></animateMotion></circle>
  <circle r="4" fill="#D784FF"><animateMotion dur="13s" begin="-7s" repeatCount="indefinite"><mpath href="#orbit3"/></animateMotion></circle>
  <circle r="8" opacity=".25" filter="url(#glow)"><animateMotion dur="6s" repeatCount="indefinite"><mpath href="#orbit1"/></animateMotion></circle>
</g>

<!-- connection spokes terminate at card centers -->
<g stroke="#BED2E8" opacity=".30" stroke-dasharray="3 8">
  <path d="M600 280L976 154M600 280L1071 214M600 280L1061 294M600 280L966 386M600 280L748 416M600 280L571 416M600 280L396 348M600 280L326 269M600 280L348 176M600 280L476 130M600 280L636 130M600 280L791 132"/>
</g>

<g transform="translate(920 130)">
  <rect width="112" height="48" rx="14" fill="#FFFFFF" stroke="#BED2E8"/>
  <circle cx="24" cy="24" r="13" fill="#FF9900" opacity=".18"/>
  <text x="24" y="28" text-anchor="middle" fill="#FF9900" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="800">AWS</text>
  <text x="45" y="28" fill="#10243E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700">AWS</text>
  <animate attributeName="opacity" values=".76;1;.76" dur="2.80s" begin="0.00s" repeatCount="indefinite"/>
</g>
<g transform="translate(1000 190)">
  <rect width="142" height="48" rx="14" fill="#FFFFFF" stroke="#BED2E8"/>
  <circle cx="24" cy="24" r="13" fill="#7B61FF" opacity=".18"/>
  <text x="24" y="28" text-anchor="middle" fill="#7B61FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="800">OTEL</text>
  <text x="45" y="28" fill="#10243E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700">OpenTelemetry</text>
  <animate attributeName="opacity" values=".76;1;.76" dur="3.25s" begin="-1.71s" repeatCount="indefinite"/>
</g>
<g transform="translate(1005 270)">
  <rect width="112" height="48" rx="14" fill="#FFFFFF" stroke="#BED2E8"/>
  <circle cx="24" cy="24" r="13" fill="#2496ED" opacity=".18"/>
  <text x="24" y="28" text-anchor="middle" fill="#2496ED" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="800">DKR</text>
  <text x="45" y="28" fill="#10243E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700">Docker</text>
  <animate attributeName="opacity" values=".76;1;.76" dur="3.25s" begin="-0.19s" repeatCount="indefinite"/>
</g>
