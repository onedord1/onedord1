  <rect width="132" height="48" rx="14" fill="#FFFFFF" stroke="#BED2E8"/>
  <circle cx="24" cy="24" r="13" fill="#844FBA" opacity=".18"/>
  <text x="24" y="28" text-anchor="middle" fill="#844FBA" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="800">TF</text>
  <text x="45" y="28" fill="#10243E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700">Terraform</text>
  <animate attributeName="opacity" values=".76;1;.76" dur="3.70s" begin="-0.38s" repeatCount="indefinite"/>
</g>
<g transform="translate(690 392)">
  <rect width="116" height="48" rx="14" fill="#FFFFFF" stroke="#BED2E8"/>
  <circle cx="24" cy="24" r="13" fill="#EF7B4D" opacity=".18"/>
  <text x="24" y="28" text-anchor="middle" fill="#EF7B4D" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="800">ARGO</text>
  <text x="45" y="28" fill="#10243E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700">Argo CD</text>
  <animate attributeName="opacity" values=".76;1;.76" dur="4.15s" begin="-0.57s" repeatCount="indefinite"/>
</g>
<g transform="translate(505 392)">
  <rect width="132" height="48" rx="14" fill="#FFFFFF" stroke="#BED2E8"/>
  <circle cx="24" cy="24" r="13" fill="#E6522C" opacity=".18"/>
  <text x="24" y="28" text-anchor="middle" fill="#E6522C" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="800">PROM</text>
  <text x="45" y="28" fill="#10243E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700">Prometheus</text>
  <animate attributeName="opacity" values=".76;1;.76" dur="2.80s" begin="-0.76s" repeatCount="indefinite"/>
</g>
<g transform="translate(340 324)">
  <rect width="112" height="48" rx="14" fill="#FFFFFF" stroke="#BED2E8"/>
  <circle cx="24" cy="24" r="13" fill="#F46800" opacity=".18"/>
  <text x="24" y="28" text-anchor="middle" fill="#F46800" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="800">GRAF</text>
  <text x="45" y="28" fill="#10243E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700">Grafana</text>
  <animate attributeName="opacity" values=".76;1;.76" dur="3.25s" begin="-0.95s" repeatCount="indefinite"/>
</g>
<g transform="translate(270 245)">
  <rect width="112" height="48" rx="14" fill="#FFFFFF" stroke="#BED2E8"/>
  <circle cx="24" cy="24" r="13" fill="#0F1689" opacity=".18"/>
  <text x="24" y="28" text-anchor="middle" fill="#0F1689" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" font-weight="800">HELM</text>
  <text x="45" y="28" fill="#10243E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700">Helm</text>
  <animate attributeName="opacity" values=".76;1;.76" dur="4.15s" begin="-2.09s" repeatCount="indefinite"/>
</g>
<g transform="translate(292 152)">
  <rect width="112" height="48" rx="14" fill="#FFFFFF" stroke="#BED2E8"/>
  <circle cx="24" cy="24" r="13" fill="#EE0000" opacity=".18"/>
  <text x="24" y="28" text-anchor="middle" fill="#EE0000" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="800">ANS</text>
  <text x="45" y="28" fill="#10243E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700">Ansible</text>
