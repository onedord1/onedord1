  <rect width="112" height="48" rx="14" fill="#FFFFFF" stroke="#BED2E8"/>
  <circle cx="24" cy="24" r="13" fill="#FC6D26" opacity=".18"/>
  <text x="24" y="28" text-anchor="middle" fill="#FC6D26" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="800">GL</text>
  <text x="45" y="28" fill="#10243E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700">GitLab</text>
  <animate attributeName="opacity" values=".76;1;.76" dur="3.70s" begin="-1.14s" repeatCount="indefinite"/>
</g>
<g transform="translate(580 106)">
  <rect width="112" height="48" rx="14" fill="#FFFFFF" stroke="#BED2E8"/>
  <circle cx="24" cy="24" r="13" fill="#D24939" opacity=".18"/>
  <text x="24" y="28" text-anchor="middle" fill="#D24939" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="800">JNK</text>
  <text x="45" y="28" fill="#10243E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700">Jenkins</text>
  <animate attributeName="opacity" values=".76;1;.76" dur="4.15s" begin="-1.33s" repeatCount="indefinite"/>
</g>
<g transform="translate(735 108)">
  <rect width="112" height="48" rx="14" fill="#FFFFFF" stroke="#BED2E8"/>
  <circle cx="24" cy="24" r="13" fill="#FFD814" opacity=".18"/>
  <text x="24" y="28" text-anchor="middle" fill="#FFD814" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="800">VLT</text>
  <text x="45" y="28" fill="#10243E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700">Vault</text>
  <animate attributeName="opacity" values=".76;1;.76" dur="2.80s" begin="-1.52s" repeatCount="indefinite"/>
</g>
<rect x="1" y="1" width="1198" height="458" rx="23" fill="none" stroke="#BED2E8"/>
</svg>