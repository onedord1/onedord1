  <text y="58" text-anchor="middle" fill="#10243E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="800">REGISTRY</text>
  <circle r="34" fill="none" stroke="#FFB454" opacity="0"><animate attributeName="r" values="34;43;34" dur="3.4s" begin="-0.72s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.28;0" dur="3.4s" begin="-0.72s" repeatCount="indefinite"/></circle>
</g><g transform="translate(671 126)">
  <circle r="34" fill="#FFFFFF" stroke="#BED2E8" stroke-width="1.4"/>
  <circle r="23" fill="#EF7B4D" opacity=".14"/>
  <text y="7" text-anchor="middle" fill="#EF7B4D" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="800">CD</text>
  <text y="58" text-anchor="middle" fill="#10243E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="800">GITOPS</text>
  <circle r="34" fill="none" stroke="#EF7B4D" opacity="0"><animate attributeName="r" values="34;43;34" dur="3.4s" begin="-0.96s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.28;0" dur="3.4s" begin="-0.96s" repeatCount="indefinite"/></circle>
</g><g transform="translate(818 126)">
  <circle r="34" fill="#FFFFFF" stroke="#BED2E8" stroke-width="1.4"/>
  <circle r="23" fill="#326CE5" opacity=".14"/>
  <text y="7" text-anchor="middle" fill="#326CE5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="800">K8S</text>
  <text y="58" text-anchor="middle" fill="#10243E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="800">K8S</text>
  <circle r="34" fill="none" stroke="#326CE5" opacity="0"><animate attributeName="r" values="34;43;34" dur="3.4s" begin="-1.20s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.28;0" dur="3.4s" begin="-1.20s" repeatCount="indefinite"/></circle>
</g><g transform="translate(965 126)">
  <circle r="34" fill="#FFFFFF" stroke="#BED2E8" stroke-width="1.4"/>
  <circle r="23" fill="#E6522C" opacity=".14"/>
  <text y="7" text-anchor="middle" fill="#E6522C" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="800">SLO</text>
  <text y="58" text-anchor="middle" fill="#10243E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="800">OBSERVE</text>
  <circle r="34" fill="none" stroke="#E6522C" opacity="0"><animate attributeName="r" values="34;43;34" dur="3.4s" begin="-1.44s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.28;0" dur="3.4s" begin="-1.44s" repeatCount="indefinite"/></circle>
</g><g transform="translate(1112 126)">
  <circle r="34" fill="#FFFFFF" stroke="#BED2E8" stroke-width="1.4"/>
  <circle r="23" fill="#55E38E" opacity=".14"/>
  <text y="7" text-anchor="middle" fill="#55E38E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="800">DR</text>
  <text y="58" text-anchor="middle" fill="#10243E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="800">RECOVER</text>
  <circle r="34" fill="none" stroke="#55E38E" opacity="0"><animate attributeName="r" values="34;43;34" dur="3.4s" begin="-1.68s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.28;0" dur="3.4s" begin="-1.68s" repeatCount="indefinite"/></circle>
</g>
<rect x="1" y="1" width="1198" height="228" rx="23" fill="none" stroke="#BED2E8"/>
</svg>