<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="230" viewBox="0 0 1200 230" role="img" aria-labelledby="title desc">
<title id="title">Animated DevSecOps delivery pipeline</title><desc id="desc">Commit, build, scan, registry, GitOps, Kubernetes, observe and recover stages connected by moving release signals.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#F8FBFF"/><stop offset="1" stop-color="#EAF3FF"/></linearGradient>
  <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#5CA8FF"/><stop offset=".22" stop-color="#30E6D2"/><stop offset=".45" stop-color="#D784FF"/><stop offset=".68" stop-color="#FFB454"/><stop offset="1" stop-color="#55E38E"/></linearGradient>
  <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="6"/></filter>
  <path id="track" d="M83 126H1112"/>
</defs>
<rect width="1200" height="230" rx="24" fill="url(#bg)"/>
<text x="46" y="40" fill="#10243E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="800" letter-spacing="2">DELIVERY CONTROL LOOP</text>
<text x="46" y="63" fill="#526B85" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">A release is not complete until it is verified, observed and recoverable.</text>
<path d="M83 126H1112" stroke="#BED2E8" stroke-width="4" stroke-linecap="round"/>
<path d="M83 126H1112" stroke="url(#flow)" stroke-width="2" stroke-linecap="round" stroke-dasharray="10 14"><animate attributeName="stroke-dashoffset" values="48;0" dur="1.7s" repeatCount="indefinite"/></path>
<circle r="7" fill="#30E6D2" filter="url(#glow)" opacity=".35"><animateMotion dur="5.8s" repeatCount="indefinite"><mpath href="#track"/></animateMotion></circle>
<circle r="4" fill="#F4F9FF"><animateMotion dur="5.8s" repeatCount="indefinite"><mpath href="#track"/></animateMotion></circle>
<g transform="translate(83 126)">
  <circle r="34" fill="#FFFFFF" stroke="#BED2E8" stroke-width="1.4"/>
  <circle r="23" fill="#5CA8FF" opacity=".14"/>
  <text y="7" text-anchor="middle" fill="#5CA8FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="800">&lt;&gt;</text>
  <text y="58" text-anchor="middle" fill="#10243E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="800">COMMIT</text>
  <circle r="34" fill="none" stroke="#5CA8FF" opacity="0"><animate attributeName="r" values="34;43;34" dur="3.4s" begin="0.00s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.28;0" dur="3.4s" begin="0.00s" repeatCount="indefinite"/></circle>
</g><g transform="translate(230 126)">
  <circle r="34" fill="#FFFFFF" stroke="#BED2E8" stroke-width="1.4"/>
  <circle r="23" fill="#30E6D2" opacity=".14"/>
  <text y="7" text-anchor="middle" fill="#30E6D2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="800">CI</text>
  <text y="58" text-anchor="middle" fill="#10243E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="800">BUILD</text>
  <circle r="34" fill="none" stroke="#30E6D2" opacity="0"><animate attributeName="r" values="34;43;34" dur="3.4s" begin="-0.24s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.28;0" dur="3.4s" begin="-0.24s" repeatCount="indefinite"/></circle>
</g><g transform="translate(377 126)">
  <circle r="34" fill="#FFFFFF" stroke="#BED2E8" stroke-width="1.4"/>
  <circle r="23" fill="#D784FF" opacity=".14"/>
  <text y="7" text-anchor="middle" fill="#D784FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="800">SEC</text>
  <text y="58" text-anchor="middle" fill="#10243E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="800">SCAN</text>
  <circle r="34" fill="none" stroke="#D784FF" opacity="0"><animate attributeName="r" values="34;43;34" dur="3.4s" begin="-0.48s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.28;0" dur="3.4s" begin="-0.48s" repeatCount="indefinite"/></circle>
</g><g transform="translate(524 126)">
  <circle r="34" fill="#FFFFFF" stroke="#BED2E8" stroke-width="1.4"/>
  <circle r="23" fill="#FFB454" opacity=".14"/>
